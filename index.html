<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>halaman awal</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --merah:#E63946;--putih:#F1FAEE;--biru-tua:#1D3557;
      --biru:#457B9D;--kuning:#FFD60A;--hijau:#2DC653;--oranye:#FF9F1C;}
    body{
      min-height:100vh;font-family:'Nunito',sans-serif;
      background:linear-gradient(135deg,#1D3557 0%,#457B9D 50%,#A8DADC 100%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      overflow:hidden;position:relative;}

    .shape{position:absolute;border-radius:50%;opacity:.18;animation:float 6s ease-in-out infinite;}
    .s1{width:220px;height:220px;background:var(--kuning);top:-60px;left:-70px;animation-delay:0s;}
    .s2{width:160px;height:160px;background:var(--merah);bottom:-50px;right:-50px;animation-delay:1s;}
    .s3{width:100px;height:100px;background:var(--hijau);top:30%;right:5%;animation-delay:2s;}
    .s4{width:80px;height:80px;background:var(--oranye);bottom:20%;left:5%;animation-delay:3s;}
    @keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-20px) rotate(8deg)}}
    .stars{position:absolute;inset:0;pointer-events:none;}
    .star{position:absolute;width:8px;height:8px;background:var(--kuning);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);animation:twinkle 3s ease-in-out infinite;opacity:.7;}
    @keyframes twinkle{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:.2;transform:scale(.5)}}

    .card{position:relative;z-index:10;background:rgba(255,255,255,.96);border-radius:32px;padding:48px 60px 52px;max-width:680px;width:90%;text-align:center;
      box-shadow:0 25px 70px rgba(0,0,0,.35),0 0 0 6px rgba(255,255,255,.2);animation:slideUp .8s cubic-bezier(.34,1.56,.64,1) both;}
    .card::before{content:'';position:absolute;inset:-4px;border-radius:36px;z-index:-1;background:linear-gradient(135deg,var(--kuning),var(--merah),var(--biru),var(--hijau));}
    @keyframes slideUp{from{opacity:0;transform:translateY(60px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
    .badge{display:inline-block;background:var(--kuning);color:var(--biru-tua);font-weight:800;font-size:.82rem;padding:6px 20px;border-radius:50px;letter-spacing:1px;margin-bottom:18px;text-transform:uppercase;}
    .map-icon{font-size:72px;line-height:1;margin-bottom:10px;animation:bounce 2s ease-in-out infinite;}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    h1{font-family:'Baloo 2',cursive;font-size:clamp(2rem,6vw,3rem);color:var(--biru-tua);line-height:1.15;margin-bottom:8px;}
    h1 span{color:var(--merah);}
    .subtitle{font-size:1rem;color:#555;margin-bottom:12px;}

    .divider{display:flex;align-items:center;gap:10px;justify-content:center;margin:16px 0 24px;}
    .divider span{font-size:1.3rem;}
    .divider hr{flex:1;border:none;border-top:2px dashed #ddd;}

    .pills{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:32px;}
    .pill{padding:6px 16px;border-radius:50px;font-size:.82rem;font-weight:700;color:#fff;}
    .p-ict{background:var(--biru);}
    .p-bab{background:var(--oranye);}
    .p-kelas{background:var(--hijau);}

    .btn-mulai{
      display:inline-flex;align-items:center;gap:12px;
      background:linear-gradient(135deg,var(--merah),#ff6b6b);color:#fff;
      font-family:'Baloo 2',cursive;font-size:1.35rem;font-weight:800;
      padding:18px 52px;border-radius:60px;border:none;cursor:pointer;
      text-decoration:none;box-shadow:0 8px 24px rgba(230,57,70,.45);
      transition:transform .2s,box-shadow .2s;animation:pulse 2.5s infinite;
    }
    .btn-mulai:hover{transform:scale(1.06) translateY(-3px);box-shadow:0 14px 36px rgba(230,57,70,.55);animation:none;}
    @keyframes pulse{
      0%,100%{box-shadow:0 8px 24px rgba(230,57,70,.45),0 0 0 0 rgba(230,57,70,.4);}
      60%{box-shadow:0 8px 24px rgba(230,57,70,.45),0 0 0 16px rgba(230,57,70,0);}}
    .arrow{font-size:1.4rem;transition:transform .2s;}
    .btn-mulai:hover .arrow{transform:translateX(5px);}
    .footer-note{margin-top:26px;font-size:.78rem;color:#aaa;}
  </style>
</head>
<body>
  <div class="shape s1"></div><div class="shape s2"></div>
  <div class="shape s3"></div><div class="shape s4"></div>
  <div class="stars" id="stars"></div>

  <div class="card">
    <div class="badge">📚 Media Pembelajaran ICT</div>
    <div class="map-icon">🗺️</div>
    <h1>IPAS</h1>
    <p class="subtitle"><b>Bab 7 · Daerahku Kebanggaanku · Kelas 5 SD</b></p>
    <div class="divider"><hr/><span></span><hr/></div>
    <a href="menu.html" class="btn-mulai">Mulai Belajar <span class="arrow">→</span></a>
    <p class="footer-note">Klik tombol di atas untuk memulai pembelajaran 🎉</p>
  </div>

  <script>
    const c = document.getElementById('stars');
    for(let i=0;i<30;i++){
      const s=document.createElement('div');s.className='star';
      s.style.cssText=`top:${Math.random()*100}%;left:${Math.random()*100}%;
        width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;
        animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*3}s;`;
      c.appendChild(s);
    }
  </script>
</body>
</html>
